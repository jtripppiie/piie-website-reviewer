<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIIE Web Reviewer Static Demo</title>
  <link rel="stylesheet" href="static-review.css?v=1.1.9">
  <link rel="stylesheet" href="static-demo-overrides.css?v=1.1.9">
</head>
<body>
  <header class="app-header">
    <div class="header-actions">
      <button type="button" class="debug-logo" id="demoDebugLogo" title="Click three times to toggle demo notes" aria-pressed="false">
        <img src="assets/logo.png" alt="" onerror="this.hidden=true">
        <span class="debug-logo__fallback">PIIE</span>
      </button>
      <button type="button" id="viewNotes">View notes</button>
      <button type="button" id="clearNotes">Clear Local Notes</button>
      <div class="preview-status header-preview-status" id="headerPreviewStatus" aria-live="polite"></div>
    </div>
    <div class="header-feedback" id="headerFeedback"></div>
  </header>

  <main id="app" class="review-app">
    <p>Loading packet...</p>
  </main>

  <aside class="debug-panel">
    <h2>Debug</h2>
    <pre id="debugOutput">Loading...</pre>
  </aside>

  <div class="admin-tools" id="adminTools" hidden>
    <section class="admin-tools__panel" role="dialog" aria-modal="true" aria-labelledby="adminToolsTitle">
      <div class="admin-tools__bar">
        <h2 id="adminToolsTitle">Admin Tools</h2>
        <button type="button" data-admin-tools-close>Close</button>
      </div>
      <p>Edit this browser demo here, or open the local app for backend tools.</p>
      <div class="admin-tools__actions">
        <button type="button" data-admin-quick-edit>Edit review URLs</button>
        <button type="button" data-admin-debug-notes>Show debug notes</button>
        <a class="button" href="http://localhost:3000/admin" target="_blank" rel="noopener">Open local admin</a>
        <a class="button" href="http://localhost:3000/admin" target="_blank" rel="noopener">Capture screenshots locally</a>
      </div>
      <p class="muted">Screenshot capture and packet edit pages require the local backend and admin access.</p>
    </section>
  </div>

  <script src="static-review.js?v=1.1.9"></script>
</body>
</html>
