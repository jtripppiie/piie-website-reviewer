<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIIE Web Reviewer Static Demo</title>
  <link rel="stylesheet" href="static-review.css?v=1.1.6">
  <link rel="stylesheet" href="static-demo-overrides.css?v=1.1.6">
</head>
<body>
  <header class="app-header">
    <div class="header-actions">
      <button type="button" class="debug-logo" id="demoDebugLogo" title="Click three times to toggle demo notes" aria-pressed="false">
        <img src="assets/logo.png" alt="" onerror="this.hidden=true">
        <span class="debug-logo__fallback">PIIE</span>
      </button>
      <button type="button" id="viewNotes">View notes</button>
      <button type="button" id="clearNotes">Clear Local Notes</button>
      <div class="preview-status header-preview-status" id="headerPreviewStatus" aria-live="polite"></div>
    </div>
    <div class="header-feedback" id="headerFeedback"></div>
  </header>

  <main id="app" class="review-app">
    <p>Loading packet...</p>
  </main>

  <aside class="debug-panel">
    <h2>Debug</h2>
    <pre id="debugOutput">Loading...</pre>
  </aside>

  <script src="static-review.js?v=1.1.6"></script>
</body>
</html>
